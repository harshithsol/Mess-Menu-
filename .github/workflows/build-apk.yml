name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          ZIP=$(ls *.zip | head -n1)
          echo "Extracting $ZIP"
          unzip -o "$ZIP" -d .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK for clarity
        run: cp app/build/outputs/apk/debug/app-debug.apk MessMenu-debug.apk

      - name: Publish as a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MessMenu build ${{ github.run_number }}
          files: MessMenu-debug.apk
